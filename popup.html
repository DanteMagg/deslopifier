<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      background: #fff;
      color: #111;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label {
      font-size: 13px;
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #1d9bf0; }
    input:checked + .slider::before { transform: translateX(16px); }
    .counter {
      font-size: 12px;
      color: #555;
      margin-bottom: 12px;
    }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 12px 0;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .keyword-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .keyword-input-row input {
      flex: 1;
      font-size: 12px;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
    }
    .keyword-input-row input:focus {
      border-color: #1d9bf0;
    }
    .keyword-input-row button {
      font-size: 12px;
      padding: 5px 10px;
      background: #1d9bf0;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .keyword-input-row button:hover { background: #1a8cd8; }
    .keywords-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .keyword-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      background: #f0f0f0;
      border-radius: 12px;
      padding: 3px 8px 3px 10px;
    }
    .keyword-tag button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      padding: 0;
      line-height: 1;
    }
    .keyword-tag button:hover { color: #e00; }
    .keywords-empty {
      font-size: 11px;
      color: #aaa;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Deslopifier</h1>
  <div class="row">
    <label for="toggle">Active</label>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="counter" id="counter">0 posts hidden this session</div>

  <hr class="divider" />
  <div class="section-label">Keywords</div>
  <div class="keyword-input-row">
    <input type="text" id="keyword-input" placeholder="e.g. SomeCompany" />
    <button id="keyword-add">Add</button>
  </div>
  <div class="keywords-list" id="keywords-list">
    <span class="keywords-empty">No custom keywords</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
