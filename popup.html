<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background: #fff;
      color: #111;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    label {
      font-size: 13px;
    }
    /* Toggle switch */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #1d9bf0; }
    input:checked + .slider::before { transform: translateX(16px); }
    .counter {
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Deslopifier</h1>
  <div class="row">
    <label for="toggle">Active</label>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="counter" id="counter">0 posts hidden this session</div>
  <script src="popup.js"></script>
</body>
</html>
